<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>EGAM Ministry | Register</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%23b22234'/%3E%3Ctext x='50' y='67' font-size='50' text-anchor='middle' fill='gold' font-weight='bold'%3EGA%3C/text%3E%3C/svg%3E" type="image/x-icon">
    <!-- Google Font: Source Sans Pro -->
    <link href="https://fonts.googleapis.com/css?family=Source+Sans+Pro:300,400,600,700" rel="stylesheet">
    <!-- Bootstrap + Font Awesome -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #F7F9FC;
            font-family: "Source Sans Pro", sans-serif;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            padding: 20px;
        }
        .register-wrapper {
            width: 800px;
            margin: 30px auto;
            flex: 1;
        }
        .register-card {
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            padding: 30px 35px 35px;
            transition: all 0.3s;
        }
        .register-card h2 {
            text-align: center;
            color: #d9534f;
            font-weight: 700;
            margin-bottom: 25px;
            font-size: 28px;
        }
        .form-group label {
            font-weight: 600;
            color: #333;
            margin-bottom: 5px;
        }
        .form-control {
            border-radius: 8px;
            border: 1px solid #ddd;
            padding: 10px 15px;
            font-size: 15px;
        }
        .form-control:focus {
            border-color: #d9534f;
            box-shadow: 0 0 0 0.2rem rgba(217,83,79,0.25);
        }
        .btn-danger {
            background-color: #d9534f;
            border: none;
            padding: 10px;
            font-weight: bold;
            border-radius: 40px;
            font-size: 16px;
            transition: 0.3s;
        }
        .btn-danger:hover {
            background-color: #c9302c;
            transform: scale(0.98);
        }
        .checkbox-verify {
            margin: 15px 0;
            text-align: center;
            font-size: 14px;
            color: #28a745;
            font-weight: 500;
        }
        .checkbox-verify input {
            margin-right: 8px;
            transform: scale(1.1);
        }
        .image-preview {
            text-align: center;
            margin-bottom: 15px;
        }
        .image-preview img {
            width: 100px;
            height: 100px;
            object-fit: cover;
            border-radius: 50%;
            border: 3px solid #d9534f;
            background: #f8f9fa;
            padding: 3px;
        }
        .footer-links {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
        }
        .footer-links a {
            color: #d9534f;
            font-weight: 600;
        }
        .footer-links a:hover {
            text-decoration: underline;
        }
        .alert-custom {
            font-size: 13px;
            padding: 8px 12px;
            border-radius: 8px;
            margin-top: 10px;
        }
        hr {
            background: #ddd;
        }
        .portal-footer {
            text-align: center;
            padding: 20px 0;
            margin-top: 30px;
            font-size: 14px;
            color: #6c757d;
            border-top: 1px solid #dee2e6;
        }
        @media (max-width: 576px) {
            .register-card { padding: 20px; }
        }
    </style>
</head>
<body>
    <div class="register-wrapper">
        <div class="register-card">
            <div class="text-center mb-3">
                <img src="img/egamlogo.png" alt="Logo" class="rounded-circle" width="80" height="80" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22%3E%3Crect width=%22100%22 height=%22100%22 fill=%22%23b22234%22/%3E%3Ctext x=%2250%22 y=%2267%22 font-size=%2250%22 text-anchor=%22middle%22 fill=%22gold%22%3EGA%3C/text%3E%3C/svg%3E'">
            </div>
            <h2>Create Account</h2>
            <form id="registerForm">
                <!-- Full Name -->
                <div class="form-group">
                    <label>Full Name <span class="text-danger">*</span></label>
                    <input type="text" id="fullName" class="form-control" placeholder="Enter your full name" required>
                </div>
                <!-- Email -->
                <div class="form-group">
                    <label>Email Address <span class="text-danger">*</span></label>
                    <input type="email" id="email" class="form-control" placeholder="you@example.com" required>
                </div>
                <!-- Password -->
                <div class="form-group">
                    <label>Password <span class="text-danger">*</span></label>
                    <input type="password" id="password" class="form-control" placeholder="Create a password" required>
                </div>
                <!-- Confirm Password -->
                <div class="form-group">
                    <label>Confirm Password <span class="text-danger">*</span></label>
                    <input type="password" id="confirmPassword" class="form-control" placeholder="Repeat password" required>
                </div>
                <!-- Registration Number -->
                <div class="form-group">
                    <label>Registration Number <span class="text-danger">*</span></label>
                    <input type="text" id="regNumber" class="form-control" placeholder="e.g., EGAM/2025/CM/101" required>
                </div>
                <!-- Vocational Category -->
                <div class="form-group">
                    <label>Vocational Category <span class="text-danger">*</span></label>
                    <select id="category" class="form-control" required>
                        <option value="">-- Select Category --</option>
                        <option>Administration</option>
                        <option>Vocational</option>
                        <option>Technical</option>
                        <option>Counseling</option>
                        <option>Theology</option>
                        <option>Media</option>
                        <option>Welfare</option>
                        <option>ICT</option>
                        <option>Education</option>
                        <option>Volunteer</option>
                    </select>
                </div>
                <!-- Post / Subject -->
                <div class="form-group">
                    <label>Post / Subject <span class="text-danger">*</span></label>
                    <input type="text" id="post" class="form-control" placeholder="e.g., Music Minister, Web Developer" required>
                </div>
                <!-- Profile Image Upload -->
                <div class="form-group">
                    <label>Profile Image (optional)</label>
                    <input type="file" id="profileImage" accept="image/*" class="form-control-file">
                    <div class="image-preview mt-2">
                        <img id="imagePreview" src="img/default_user.jpg" alt="Preview">
                    </div>
                    <small class="text-muted">Upload a square image (will be resized). Default image if none.</small>
                </div>

                <!-- Verification Checkbox -->
                <div class="checkbox-verify">
                    <label>
                        <input type="checkbox" id="registerCheck"> I confirm that the information provided is correct.
                    </label>
                </div>

                <button type="submit" class="btn btn-danger btn-block">Register</button>
                <hr>
                <div class="footer-links">
                    Already have an account? <a href="login.html">Sign In</a>
                </div>
            </form>
        </div>
    </div>

    <footer class="portal-footer">
        <p>&copy; <span id="currentYear"></span> EGAM Ministry. All rights reserved.</p>
        <p class="small">Empowering lives through faith and technology</p>
    </footer>

    <script>
        // Helper: resize image to 100x100 base64
        function resizeImage(file, callback) {
            const reader = new FileReader();
            reader.onload = function(e) {
                const img = new Image();
                img.onload = function() {
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    const size = 100;
                    canvas.width = size;
                    canvas.height = size;
                    ctx.drawImage(img, 0, 0, size, size);
                    const resizedDataUrl = canvas.toDataURL('image/jpeg', 0.8);
                    callback(resizedDataUrl);
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        // Preview uploaded image
        document.getElementById('profileImage').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(ev) {
                    document.getElementById('imagePreview').src = ev.target.result;
                };
                reader.readAsDataURL(file);
            } else {
                document.getElementById('imagePreview').src = 'img/default_user.jpg';
            }
        });

        // Handle registration
        document.getElementById('registerForm').addEventListener('submit', function(event) {
            event.preventDefault();

            const fullName = document.getElementById('fullName').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const confirm = document.getElementById('confirmPassword').value;
            const regNumber = document.getElementById('regNumber').value.trim();
            const category = document.getElementById('category').value;
            const post = document.getElementById('post').value.trim();
            const check = document.getElementById('registerCheck').checked;
            const imageFile = document.getElementById('profileImage').files[0];

            // Validation
            if (!fullName || !email || !password || !regNumber || !category || !post) {
                alert("Please fill in all required fields.");
                return;
            }
            if (password !== confirm) {
                alert("Passwords do not match.");
                return;
            }
            if (password.length < 4) {
                alert("Password must be at least 4 characters.");
                return;
            }
            if (!check) {
                alert("You must confirm that your information is correct.");
                return;
            }

            // Check if email already exists in stored users
            let users = JSON.parse(localStorage.getItem('egamUsers')) || [];
            if (users.some(u => u.email.toLowerCase() === email.toLowerCase())) {
                alert("Email already registered. Please use a different email.");
                return;
            }

            // Process image (default or uploaded)
            const processImage = (imageData) => {
                const newUser = {
                    fullName: fullName,
                    email: email,
                    password: password,
                    regNumber: regNumber,
                    category: category,
                    post: post,
                    image: imageData || 'img/default_user.jpg',
                    createdAt: new Date().toISOString()
                };
                users.push(newUser);
                localStorage.setItem('egamUsers', JSON.stringify(users));
                alert("Registration successful! You can now log in.");
                window.location.href = "login.html";
            };

            if (imageFile) {
                resizeImage(imageFile, (resizedBase64) => {
                    processImage(resizedBase64);
                });
            } else {
                processImage('img/default_user.jpg');
            }
        });

        // Set current year in footer
        document.getElementById('currentYear').innerText = new Date().getFullYear();

        // Optional: load default preview if default image exists
        const defaultImg = new Image();
        defaultImg.src = 'img/default_user.jpg';
        defaultImg.onerror = function() {
            document.getElementById('imagePreview').src = 'data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22%3E%3Ccircle cx=%2250%22 cy=%2250%22 r=%2248%22 fill=%22%23d9534f%22/%3E%3Ctext x=%2250%22 y=%2267%22 font-size=%2236%22 text-anchor=%22middle%22 fill=%22white%22%3EGA%3C/text%3E%3C/svg%3E';
        };
    </script>


</body>
</html>
