<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EGAM Ministry | Register</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%23b22234'/%3E%3Ctext x='50' y='67' font-size='50' text-anchor='middle' fill='gold' font-weight='bold'%3EGA%3C/text%3E%3C/svg%3E">
    <link href="https://fonts.googleapis.com/css?family=Source+Sans+Pro:300,400,600,700" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #F7F9FC; font-family: "Source Sans Pro", sans-serif; display: flex; flex-direction: column; min-height: 100vh; padding: 20px; }
        .register-wrapper { width: 800px; margin: 30px auto; flex: 1; }
        .register-card { background: #fff; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); padding: 30px 35px 35px; }
        .register-card h2 { text-align: center; color: #d9534f; font-weight: 700; margin-bottom: 25px; font-size: 28px; }
        .form-group label { font-weight: 600; color: #333; }
        .form-control { border-radius: 8px; border: 1px solid #ddd; padding: 10px 15px; }
        .btn-danger { background-color: #d9534f; border: none; padding: 10px; font-weight: bold; border-radius: 40px; }
        .btn-danger:hover { background-color: #c9302c; transform: scale(0.98); }
        .checkbox-verify { margin: 15px 0; text-align: center; }
        .footer-links { text-align: center; margin-top: 20px; }
        .portal-footer { text-align: center; padding: 20px 0; margin-top: 30px; color: #6c757d; border-top: 1px solid #dee2e6; }
        @media (max-width: 576px) { .register-card { padding: 20px; } }
    </style>
</head>
<body>
    <div class="register-wrapper">
        <div class="register-card">
            <div class="text-center mb-3">
                <img src="img/egamlogo.png" alt="Logo" width="80" height="80" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22%3E%3Crect width=%22100%22 height=%22100%22 fill=%22%23b22234%22/%3E%3Ctext x=%2250%22 y=%2267%22 font-size=%2250%22 text-anchor=%22middle%22 fill=%22gold%22%3EGA%3C/text%3E%3C/svg%3E'">
            </div>
            <h2>Create Account</h2>
            <form id="registerForm">
                <div class="form-group">
                    <label>Full Name <span class="text-danger">*</span></label>
                    <input type="text" id="fullName" class="form-control" required>
                </div>
                <div class="form-group">
                    <label>Email Address <span class="text-danger">*</span></label>
                    <input type="email" id="email" class="form-control" required>
                </div>
                <div class="form-group">
                    <label>Password <span class="text-danger">*</span></label>
                    <input type="password" id="password" class="form-control" required>
                </div>
                <div class="form-group">
                    <label>Confirm Password <span class="text-danger">*</span></label>
                    <input type="password" id="confirmPassword" class="form-control" required>
                </div>
                <div class="form-group">
                    <label>Registration Number <span class="text-danger">*</span></label>
                    <input type="text" id="regNumber" class="form-control" placeholder="e.g., EGAM/2025/CM/101" required>
                </div>
                <div class="form-group">
                    <label>Vocational Category <span class="text-danger">*</span></label>
                    <select id="category" class="form-control" required>
                        <option value="">-- Select Category --</option>
                        <option>Administration</option><option>Vocational</option><option>Technical</option>
                        <option>Counseling</option><option>Theology</option><option>Media</option>
                        <option>Welfare</option><option>ICT</option><option>Education</option><option>Volunteer</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Post / Subject <span class="text-danger">*</span></label>
                    <input type="text" id="post" class="form-control" required>
                </div>

                <div class="checkbox-verify">
                    <label><input type="checkbox" id="registerCheck" required> I confirm that the information provided is correct.</label>
                </div>

                <button type="submit" class="btn btn-danger btn-block">Register</button>
                <hr>
                <div class="footer-links">
                    Already have an account? <a href="login.html">Sign In</a>
                </div>
            </form>
        </div>
    </div>
    <footer class="portal-footer">
        <p>&copy; <span id="currentYear"></span> EGAM Ministry. All rights reserved.</p>
        <p class="small">Empowering lives through faith and technology</p>
    </footer>

    <script>
        // IMPORTANT: Replace this URL with your deployed Apps Script web app URL
        const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzyCoetDZwD4tB4c8oGEyFhv7X7XoGWhYkbLVAmf04i3YjHfakGGje-mBR8d8U9p9J1/exec';

        document.getElementById('registerForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const fullName = document.getElementById('fullName').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const confirm = document.getElementById('confirmPassword').value;
            const regNumber = document.getElementById('regNumber').value.trim();
            const category = document.getElementById('category').value;
            const post = document.getElementById('post').value.trim();
            const check = document.getElementById('registerCheck').checked;

            if (!fullName || !email || !password || !regNumber || !category || !post) {
                alert('Please fill in all required fields.');
                return;
            }
            if (password !== confirm) {
                alert('Passwords do not match.');
                return;
            }
            if (password.length < 4) {
                alert('Password must be at least 4 characters.');
                return;
            }
            if (!check) {
                alert('You must confirm that your information is correct.');
                return;
            }

            // Disable submit button to prevent double submission
            const submitBtn = document.querySelector('button[type="submit"]');
            submitBtn.disabled = true;
            submitBtn.innerText = 'Registering...';

            try {
                const response = await fetch(APPS_SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors',        // Required for Apps Script web app
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ fullName, email, password, regNumber, category, post })
                });

                // Because of 'no-cors', we cannot read the response directly.
                // We assume success if no network error. To get proper error feedback,
                // you would need to deploy the web app with CORS enabled (not possible with Apps Script).
                // Instead, we redirect to confirmation page on any successful fetch.
                window.location.href = 'https://egam-minstry.github.io/Vocational-centre/confirmation.html';
            } catch (error) {
                alert('Registration failed. Please check your internet connection or try again later.');
                console.error(error);
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerText = 'Register';
            }
        });

        document.getElementById('currentYear').innerText = new Date().getFullYear();
    </script>
</body>
</html>
